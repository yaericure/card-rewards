<title>台灣信用卡回饋比較</title>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root {
    color-scheme: light;
    --bg: #f5f6fa;
    --card-bg: #ffffff;
    --text: #1c1e26;
    --muted: #6b7280;
    --border: #e2e4ea;
    --accent: #2563eb;
    --accent-dark: #1d4ed8;
    --accent-soft: #eaf0fe;
    --danger: #b91c1c;
    --danger-soft: #fdecec;
    --gold: #b45309;
    --radius: 10px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", "Helvetica Neue", Arial, sans-serif;
    line-height: 1.6;
  }
  .wrap {
    max-width: 720px;
    margin: 0 auto;
    padding: 16px 16px 64px;
  }
  header.site-header {
    padding: 24px 0 8px;
  }
  header.site-header h1 {
    font-size: 1.5rem;
    margin: 0 0 4px;
  }
  header.site-header p.sub {
    margin: 0;
    color: var(--muted);
    font-size: 0.9rem;
  }
  .banner {
    display: none;
    background: #fff7e6;
    border: 1px solid #f0c36d;
    color: #92610f;
    padding: 10px 14px;
    border-radius: var(--radius);
    font-size: 0.88rem;
    margin: 12px 0;
  }
  .banner.show { display: block; }
  .banner.error {
    background: var(--danger-soft);
    border-color: #f1a9a9;
    color: var(--danger);
  }
  section.card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    margin: 16px 0;
  }
  section.card h2 {
    font-size: 1.05rem;
    margin: 0 0 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  section.card h2 .step-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    font-size: 0.8rem;
    flex-shrink: 0;
  }
  .bank-group { margin-bottom: 16px; }
  .bank-group:last-child { margin-bottom: 0; }
  .bank-group h3 {
    font-size: 0.92rem;
    color: var(--muted);
    margin: 0 0 8px;
    font-weight: 600;
  }
  .card-option {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 8px;
    border-radius: 8px;
    cursor: pointer;
  }
  .card-option:hover { background: var(--accent-soft); }
  .card-option input[type="checkbox"] {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
    accent-color: var(--accent);
  }
  .card-option label {
    cursor: pointer;
    flex: 1;
  }
  .plan-block {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 12px;
  }
  .plan-block:last-child { margin-bottom: 0; }
  .plan-block .plan-card-name {
    font-weight: 600;
    margin-bottom: 8px;
  }
  .plan-choice {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 6px 4px;
    border-radius: 6px;
    cursor: pointer;
  }
  .plan-choice:hover { background: var(--accent-soft); }
  .plan-choice input[type="radio"] {
    margin-top: 4px;
    accent-color: var(--accent);
    flex-shrink: 0;
  }
  .plan-choice .plan-name { font-weight: 500; }
  .plan-choice .plan-condition { color: var(--muted); font-size: 0.85rem; }
  .auto-selected {
    font-size: 0.85rem;
    color: var(--muted);
  }
  input[type="text"].store-input {
    width: 100%;
    padding: 12px 14px;
    font-size: 1rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: #fff;
    color: var(--text);
  }
  input[type="text"].store-input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .autocomplete-wrap { position: relative; }
  .suggestions {
    position: absolute;
    left: 0;
    right: 0;
    top: calc(100% + 4px);
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    max-height: 260px;
    overflow-y: auto;
    z-index: 20;
    display: none;
  }
  .suggestions.show { display: block; }
  .suggestion-item {
    padding: 10px 14px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    font-size: 0.95rem;
  }
  .suggestion-item:last-child { border-bottom: none; }
  .suggestion-item:hover, .suggestion-item.active { background: var(--accent-soft); }
  .suggestion-item .s-cat {
    color: var(--muted);
    font-size: 0.8rem;
    margin-left: 6px;
  }
  .no-match-hint {
    margin-top: 10px;
    font-size: 0.88rem;
    color: var(--muted);
  }
  .selected-target {
    margin-top: 12px;
    padding: 10px 12px;
    background: var(--accent-soft);
    border-radius: 8px;
    font-size: 0.9rem;
  }
  .selected-target b { color: var(--accent-dark); }
  .result-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .result-rank {
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--muted);
    width: 28px;
    flex-shrink: 0;
    text-align: center;
  }
  .result-rank.rank-1 { color: var(--gold); }
  .result-body { flex: 1; min-width: 0; }
  .result-body .result-cardname {
    font-weight: 700;
    font-size: 1.02rem;
  }
  .result-body .result-bank {
    color: var(--muted);
    font-size: 0.85rem;
  }
  .result-body .result-plan {
    color: var(--muted);
    font-size: 0.85rem;
    margin-top: 2px;
  }
  .result-body .result-meta {
    margin-top: 6px;
    font-size: 0.8rem;
    color: var(--muted);
  }
  .result-body .result-meta div { margin-bottom: 2px; }
  .result-body .result-basic-tag {
    display: inline-block;
    margin-top: 2px;
    font-size: 0.75rem;
    color: var(--muted);
    font-style: italic;
  }
  .result-pct {
    font-size: 1.9rem;
    font-weight: 800;
    color: var(--accent-dark);
    flex-shrink: 0;
    white-space: nowrap;
  }
  .empty-state {
    text-align: center;
    color: var(--muted);
    padding: 24px 8px;
    font-size: 0.92rem;
  }
  .btn {
    display: inline-block;
    padding: 10px 18px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: #fff;
    color: var(--text);
    font-size: 0.92rem;
    cursor: pointer;
  }
  .btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .btn.primary:hover { background: var(--accent-dark); }
  .btn:hover { border-color: var(--accent); }
  .btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  .hidden { display: none !important; }
  .reset-row {
    text-align: center;
    margin-top: 24px;
  }
  .reset-row .btn { font-size: 0.85rem; padding: 8px 14px; }
  .held-summary {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .held-summary b { color: var(--text); }
  footer.site-footer {
    text-align: center;
    color: var(--muted);
    font-size: 0.78rem;
    margin-top: 32px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      color-scheme: dark;
      --bg: #14151a;
      --card-bg: #1d1f27;
      --text: #e8e9ee;
      --muted: #9aa0ab;
      --border: #303341;
      --accent: #5b8def;
      --accent-dark: #7ea6f5;
      --accent-soft: #22283a;
      --danger: #ef6666;
      --danger-soft: #3a2223;
      --gold: #e0a94a;
    }
    input[type="text"].store-input { background: #232531; }
    .suggestions { background: #232531; }
    .banner { background: #3a3016; border-color: #6b5620; color: #f0c36d; }
  }
</style>

<div class="wrap">
  <header class="site-header">
    <h1>台灣信用卡回饋比較</h1>
    <p class="sub">選你有的卡，輸入商店，馬上看哪張卡回饋最高</p>
  </header>

  <div id="demoBanner" class="banner">目前為示範資料，實際回饋請以各銀行公告為準。</div>
  <div id="errorBanner" class="banner error"></div>

  <div id="restoredBar" class="banner hidden" style="background:var(--accent-soft); border-color: var(--accent); color: var(--accent-dark);">
    已自動帶入你上次的卡片設定。
    <button class="btn" id="resetTopBtn" style="margin-left:8px; padding:4px 10px; font-size:0.8rem;">重新設定我的卡片</button>
  </div>

  <!-- Step 1 -->
  <section class="card" id="step1">
    <h2><span class="step-num">1</span>選擇你持有的卡片</h2>
    <div id="bankGroups"></div>
  </section>

  <!-- Step 2 -->
  <section class="card hidden" id="step2">
    <h2><span class="step-num">2</span>選擇你的等級／資格</h2>
    <div id="planGroups"></div>
    <div class="btn-row">
      <button class="btn primary" id="toStep3Btn">下一步：輸入商店</button>
    </div>
  </section>

  <!-- Step 3 -->
  <section class="card hidden" id="step3">
    <h2><span class="step-num">3</span>輸入商店名稱</h2>
    <div class="held-summary" id="heldSummary"></div>
    <div class="held-summary hidden" id="skipStep2Note"></div>
    <div class="autocomplete-wrap">
      <input type="text" class="store-input" id="storeInput" placeholder="例如：momo、全家、星巴克…" autocomplete="off" />
      <div class="suggestions" id="suggestions"></div>
    </div>
    <div class="no-match-hint" id="noMatchHint" style="display:none;">
      找不到符合的商店或國家／地區，請確認輸入是否正確，或換個寫法試試（例如商店的中文全名、英文名、常見簡稱）。
    </div>
    <div class="selected-target hidden" id="selectedTarget"></div>
  </section>

  <!-- Results -->
  <section class="card hidden" id="resultsSection">
    <h2>比較結果</h2>
    <div id="resultsList"></div>
  </section>

  <div class="reset-row">
    <button class="btn" id="resetBtn">重新設定我的卡片</button>
  </div>

  <footer class="site-footer">資料僅供參考，實際回饋規則請以各銀行公告為準。</footer>
</div>

<script>
(function () {
  "use strict";

  var STORAGE_VERSION = 3;
  var STORAGE_KEY = "cardRewardsPrefs.v3";

  var state = {
    cardsData: null,
    merchantsData: null,
    usingSampleCards: false,
    usingSampleMerchants: false,
    merchantNormMap: {},      // normalize(name|alias) -> canonical merchant name
    diningSet: {},            // canonical merchant name -> true if dining=true in merchants.json
    countryNormMap: {},       // normalize(countryName) -> canonical country name (as written in cards.json)
    autocompleteList: [],     // [{ label, kind: 'merchant'|'country' }] for suggestions
    heldCardIds: [],          // array of card id
    selectedTiers: {},        // cardId -> tierId (only for cards that have `tiers`)
    currentQuery: null        // { type: 'merchant'|'country', name: canonical name } | null
  };

  // ---------- utils ----------

  function normalize(s) {
    return String(s || "")
      .toLowerCase()
      .replace(/[\s\-]/g, "");
  }

  function todayStr() {
    var d = new Date();
    var y = d.getFullYear();
    var m = String(d.getMonth() + 1).padStart(2, "0");
    var day = String(d.getDate()).padStart(2, "0");
    return y + "-" + m + "-" + day;
  }

  function isExpired(validUntil) {
    if (!validUntil) return false;
    return validUntil < todayStr();
  }

  function findBankByCardId(cardId) {
    var banks = state.cardsData.banks || [];
    for (var i = 0; i < banks.length; i++) {
      var cards = banks[i].cards || [];
      for (var j = 0; j < cards.length; j++) {
        if (cards[j].id === cardId) return { bank: banks[i], card: cards[j] };
      }
    }
    return null;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  // Build the lookup structures required by SCHEMA.md's 前端行為 section:
  //  - merchantNormMap: every normalized name/alias in merchants.json, PLUS every
  //    merchant-type reward target in cards.json that isn't already covered, maps
  //    to one canonical display name. merchants.json is indexed first so its name
  //    wins as canonical when a card's reward target is one of its aliases.
  //  - diningSet: canonical merchant name -> true, from merchants.json dining flag.
  //  - countryNormMap: normalized country name -> canonical country name, collected
  //    from every targetType="country" reward target across cards.json.
  //  - autocompleteList: union of merchant canonical names ∪ merchants.json aliases
  //    ∪ country names (SCHEMA.md 前端行為 §6).
  function buildLookups() {
    var merchantNormMap = {};
    var diningSet = {};
    var countryNormMap = {};
    var autoSet = {}; // normalized -> { label, kind } to dedupe

    function addAutocomplete(label, kind) {
      var n = normalize(label);
      if (!n || autoSet[n]) return;
      autoSet[n] = { label: label, kind: kind };
    }

    (state.merchantsData.merchants || []).forEach(function (m) {
      var canonical = m.name;
      var n = normalize(canonical);
      if (!n) return;
      merchantNormMap[n] = canonical;
      if (m.dining === true) diningSet[canonical] = true;
      addAutocomplete(canonical, "merchant");
      (m.aliases || []).forEach(function (a) {
        var an = normalize(a);
        if (an && !merchantNormMap[an]) merchantNormMap[an] = canonical;
        addAutocomplete(a, "merchant");
      });
    });

    (state.cardsData.banks || []).forEach(function (bank) {
      (bank.cards || []).forEach(function (card) {
        (card.rewards || []).forEach(function (r) {
          if (r.targetType === "merchant" && r.target) {
            var n = normalize(r.target);
            if (n && !merchantNormMap[n]) {
              merchantNormMap[n] = r.target; // not in merchants.json: canonical = itself
              addAutocomplete(r.target, "merchant");
            }
          } else if (r.targetType === "country" && r.target) {
            var cn = normalize(r.target);
            if (cn && !countryNormMap[cn]) {
              countryNormMap[cn] = r.target;
              addAutocomplete(r.target, "country");
            }
          }
        });
      });
    });

    state.merchantNormMap = merchantNormMap;
    state.diningSet = diningSet;
    state.countryNormMap = countryNormMap;
    state.autocompleteList = Object.keys(autoSet).map(function (k) { return autoSet[k]; });
  }

  // Resolve free-text input to a canonical query target.
  // Country match takes priority only if the text isn't also a known merchant name
  // (in practice country names and merchant names shouldn't collide, but merchant
  // wins on tie since that's the more specific match).
  function matchQuery(raw) {
    var nq = normalize(raw);
    if (!nq) return null;
    if (state.merchantNormMap[nq]) {
      return { type: "merchant", name: state.merchantNormMap[nq] };
    }
    if (state.countryNormMap[nq]) {
      return { type: "country", name: state.countryNormMap[nq] };
    }
    return null;
  }

  // ---------- data loading ----------

  function loadJson(primaryUrl, fallbackUrl) {
    return fetch(primaryUrl, { cache: "no-store" })
      .then(function (res) {
        if (!res.ok) throw new Error("http " + res.status);
        return res.json();
      })
      .then(function (data) {
        return { data: data, sample: false };
      })
      .catch(function () {
        return fetch(fallbackUrl, { cache: "no-store" })
          .then(function (res) {
            if (!res.ok) throw new Error("fallback http " + res.status);
            return res.json();
          })
          .then(function (data) {
            return { data: data, sample: true };
          });
      });
  }

  function init() {
    Promise.all([
      loadJson("data/cards.json", "data/cards.sample.json"),
      loadJson("data/merchants.json", "data/merchants.sample.json")
    ])
      .then(function (results) {
        state.cardsData = results[0].data;
        state.usingSampleCards = results[0].sample;
        state.merchantsData = results[1].data;
        state.usingSampleMerchants = results[1].sample;
        buildLookups();

        if (state.usingSampleCards || state.usingSampleMerchants) {
          document.getElementById("demoBanner").classList.add("show");
        }

        buildStep1();
        restorePrefs();
      })
      .catch(function (err) {
        var eb = document.getElementById("errorBanner");
        eb.textContent = "資料載入失敗，請稍後重新整理頁面。（" + err.message + "）";
        eb.classList.add("show");
      });
  }

  // ---------- Step 1: pick cards ----------

  function buildStep1() {
    var container = document.getElementById("bankGroups");
    container.innerHTML = "";
    (state.cardsData.banks || []).forEach(function (bank) {
      var group = document.createElement("div");
      group.className = "bank-group";

      var h3 = document.createElement("h3");
      h3.textContent = bank.name;
      group.appendChild(h3);

      (bank.cards || []).forEach(function (card) {
        var row = document.createElement("div");
        row.className = "card-option";

        var cb = document.createElement("input");
        cb.type = "checkbox";
        cb.id = "card-" + card.id;
        cb.value = card.id;
        cb.addEventListener("change", onCardToggle);

        var label = document.createElement("label");
        label.setAttribute("for", cb.id);
        label.textContent = card.name;

        row.appendChild(cb);
        row.appendChild(label);
        group.appendChild(row);
      });

      container.appendChild(group);
    });
  }

  function onCardToggle(e) {
    var id = e.target.value;
    if (e.target.checked) {
      if (state.heldCardIds.indexOf(id) === -1) state.heldCardIds.push(id);
    } else {
      state.heldCardIds = state.heldCardIds.filter(function (x) { return x !== id; });
      delete state.selectedTiers[id];
    }
    savePrefs();
    refreshStep2Visibility();
  }

  // A card needs step 2 only when it declares `tiers` (>= 2 entries per SCHEMA.md).
  function cardNeedsTierSelection(card) {
    return Array.isArray(card.tiers) && card.tiers.length > 0;
  }

  function getTierSelectionEntries() {
    var out = [];
    state.heldCardIds.forEach(function (cardId) {
      var found = findBankByCardId(cardId);
      if (!found) return;
      if (cardNeedsTierSelection(found.card)) out.push({ cardId: cardId, bank: found.bank, card: found.card });
    });
    return out;
  }

  function refreshStep2Visibility() {
    var step2 = document.getElementById("step2");
    var step3 = document.getElementById("step3");
    var skipNote = document.getElementById("skipStep2Note");

    if (state.heldCardIds.length === 0) {
      step2.classList.add("hidden");
      step3.classList.add("hidden");
      skipNote.classList.add("hidden");
      hideResults();
      return;
    }

    var tierEntries = getTierSelectionEntries();

    if (tierEntries.length > 0) {
      buildStep2(tierEntries);
      step2.classList.remove("hidden");
      step3.classList.add("hidden");
      skipNote.classList.add("hidden");
      hideResults();
    } else {
      // no held card declares tiers -> skip step 2 entirely, go straight to step 3
      step2.classList.add("hidden");
      step3.classList.remove("hidden");
      buildHeldSummary();
      skipNote.textContent = "你選的卡片都不需要另外選擇等級，可直接輸入商店。";
      skipNote.classList.remove("hidden");
      rerunQueryIfAny();
    }
  }

  // ---------- Step 2: pick tier per held tiered card ----------

  function buildStep2(tierEntries) {
    var container = document.getElementById("planGroups");
    container.innerHTML = "";

    tierEntries.forEach(function (entry) {
      var cardId = entry.cardId;
      var card = entry.card;
      var tiers = card.tiers || [];

      var block = document.createElement("div");
      block.className = "plan-block";

      var title = document.createElement("div");
      title.className = "plan-card-name";
      title.textContent = entry.bank.name + "｜" + card.name;
      block.appendChild(title);

      if (!state.selectedTiers[cardId] || !tiers.some(function (t) { return t.id === state.selectedTiers[cardId]; })) {
        state.selectedTiers[cardId] = tiers[0].id;
      }
      tiers.forEach(function (tier) {
        var choiceRow = document.createElement("div");
        choiceRow.className = "plan-choice";

        var radio = document.createElement("input");
        radio.type = "radio";
        radio.name = "tier-" + cardId;
        radio.id = "tier-" + cardId + "-" + tier.id;
        radio.value = tier.id;
        radio.checked = state.selectedTiers[cardId] === tier.id;
        radio.addEventListener("change", function () {
          state.selectedTiers[cardId] = tier.id;
          savePrefs();
          rerunQueryIfAny();
        });

        var labelWrap = document.createElement("label");
        labelWrap.setAttribute("for", radio.id);
        labelWrap.innerHTML =
          '<div class="plan-name"></div><div class="plan-condition"></div>';
        labelWrap.querySelector(".plan-name").textContent = tier.name;
        labelWrap.querySelector(".plan-condition").textContent = tier.condition || "無條件";

        choiceRow.appendChild(radio);
        choiceRow.appendChild(labelWrap);
        block.appendChild(choiceRow);
      });

      container.appendChild(block);
    });

    savePrefs();
  }

  document.addEventListener("DOMContentLoaded", function () {
    document.getElementById("toStep3Btn").addEventListener("click", function () {
      document.getElementById("skipStep2Note").classList.add("hidden");
      document.getElementById("step3").classList.remove("hidden");
      buildHeldSummary();
      document.getElementById("step3").scrollIntoView({ behavior: "smooth", block: "start" });
    });
  });

  function buildHeldSummary() {
    var names = state.heldCardIds.map(function (id) {
      var found = findBankByCardId(id);
      return found ? found.card.name : id;
    });
    document.getElementById("heldSummary").textContent =
      "已選 " + names.length + " 張卡：" + names.join("、");
  }

  // ---------- Step 3: store / country input ----------

  function matchSuggestions(query) {
    var nq = normalize(query);
    if (!nq) return [];
    var exact = [], prefix = [], substr = [];
    state.autocompleteList.forEach(function (item) {
      var nc = normalize(item.label);
      if (!nc) return;
      if (nc === nq) exact.push(item);
      else if (nc.indexOf(nq) === 0 || nq.indexOf(nc) === 0) prefix.push(item);
      else if (nc.indexOf(nq) !== -1) substr.push(item);
    });
    return exact.concat(prefix).concat(substr);
  }

  function initAutocomplete() {
    var input = document.getElementById("storeInput");
    var box = document.getElementById("suggestions");
    var noMatchHint = document.getElementById("noMatchHint");
    var timer = null;

    input.addEventListener("input", function () {
      var val = input.value;

      if (timer) clearTimeout(timer);
      timer = setTimeout(function () {
        if (!val.trim()) {
          box.classList.remove("show");
          noMatchHint.style.display = "none";
          state.currentQuery = null;
          hideSelectedTarget();
          hideResults();
          return;
        }

        var direct = matchQuery(val);
        if (direct) {
          state.currentQuery = direct;
          showSelectedTarget();
          computeAndRenderResults();
        } else {
          state.currentQuery = null;
          hideSelectedTarget();
          hideResults();
        }

        var matches = matchSuggestions(val).slice(0, 8);
        if (matches.length === 0) {
          box.classList.remove("show");
          noMatchHint.style.display = direct ? "none" : "block";
          return;
        }
        noMatchHint.style.display = "none";
        box.innerHTML = "";
        matches.forEach(function (m) {
          var item = document.createElement("div");
          item.className = "suggestion-item";
          item.innerHTML = '<span></span><span class="s-cat"></span>';
          item.querySelector("span").textContent = m.label;
          item.querySelector(".s-cat").textContent = m.kind === "country" ? "地區" : "";
          item.addEventListener("click", function () {
            input.value = m.label;
            state.currentQuery = matchQuery(m.label);
            box.classList.remove("show");
            noMatchHint.style.display = "none";
            showSelectedTarget();
            computeAndRenderResults();
          });
          box.appendChild(item);
        });
        box.classList.add("show");
      }, 120);
    });

    document.addEventListener("click", function (e) {
      if (!box.contains(e.target) && e.target !== input) {
        box.classList.remove("show");
      }
    });
  }

  function showSelectedTarget() {
    var el = document.getElementById("selectedTarget");
    if (state.currentQuery && state.currentQuery.type === "merchant") {
      el.innerHTML = "目前比對商店：<b>" + escapeHtml(state.currentQuery.name) + "</b>";
    } else if (state.currentQuery && state.currentQuery.type === "country") {
      el.innerHTML = "目前比對地區：<b>" + escapeHtml(state.currentQuery.name) + "</b>";
    } else {
      el.innerHTML = "";
    }
    el.classList.toggle("hidden", !state.currentQuery);
  }

  function hideSelectedTarget() {
    document.getElementById("selectedTarget").classList.add("hidden");
  }

  // re-run the current query's results after a tier selection changes or step 2
  // is skipped, so a switched tier is reflected without retyping the store name.
  function rerunQueryIfAny() {
    if (state.currentQuery) computeAndRenderResults();
  }

  // ---------- reward computation ----------

  // Resolve a reward's actual pct for the given card, honoring pctByTier when the
  // card declares tiers and the user has selected one. Returns null if it truly
  // cannot be resolved (should not happen in practice since step 2 forces a
  // selection for every held card that has tiers) so callers can skip gracefully
  // instead of crashing.
  function resolvePct(reward, card, cardId) {
    if (typeof reward.pct === "number") return reward.pct;
    if (reward.pctByTier) {
      var tierId = state.selectedTiers[cardId];
      if (tierId && typeof reward.pctByTier[tierId] === "number") {
        return reward.pctByTier[tierId];
      }
      // defensive fallback: no tier selected yet (e.g. stale state) -> use the
      // first available tier value rather than breaking the whole result list.
      var keys = Object.keys(reward.pctByTier);
      if (keys.length > 0 && typeof reward.pctByTier[keys[0]] === "number") {
        return reward.pctByTier[keys[0]];
      }
    }
    return null;
  }

  // Returns the list of reward rows that match `query` for one held card, split
  // into "specific" (merchant/dining/country hits) and "general" (基本回饋) —
  // per SCHEMA.md 前端行為: general rows are always appended after specific rows,
  // but each group is independently sorted by pct descending.
  function rowsForCard(cardId, card, bankName, query) {
    var rewards = card.rewards || [];
    var specific = [];
    var general = [];

    rewards.forEach(function (r) {
      if (isExpired(r.validUntil)) return;

      var isGeneral = r.targetType === "general";
      var hit = false;

      if (!isGeneral) {
        if (query.type === "merchant") {
          if (r.targetType === "merchant" && r.target) {
            var rn = normalize(r.target);
            var canonicalTarget = state.merchantNormMap[rn] || r.target;
            if (canonicalTarget === query.name) hit = true;
          } else if (r.targetType === "dining" && state.diningSet[query.name]) {
            hit = true;
          }
        } else if (query.type === "country") {
          if (r.targetType === "country" && r.target === query.name) hit = true;
        }
      } else {
        hit = true; // every non-expired general reward is always shown, per card
      }

      if (!hit) return;

      var pct = resolvePct(r, card, cardId);
      if (pct === null) return; // unresolvable pctByTier, skip rather than break

      var row = {
        bankName: bankName,
        cardName: card.name,
        planLabel: r.plan || "基本",
        pct: pct,
        cap: r.cap || "",
        validUntil: r.validUntil || "",
        note: r.note || "",
        isGeneral: isGeneral
      };

      if (isGeneral) general.push(row);
      else specific.push(row);
    });

    return { specific: specific, general: general };
  }

  function computeAndRenderResults() {
    var query = state.currentQuery;
    if (!query) {
      hideResults();
      return;
    }

    var specificAll = [];
    var generalAll = [];

    state.heldCardIds.forEach(function (cardId) {
      var found = findBankByCardId(cardId);
      if (!found) return;
      var res = rowsForCard(cardId, found.card, found.bank.name, query);
      specificAll = specificAll.concat(res.specific);
      generalAll = generalAll.concat(res.general);
    });

    specificAll.sort(function (a, b) { return b.pct - a.pct; });
    generalAll.sort(function (a, b) { return b.pct - a.pct; });
    var rows = specificAll.concat(generalAll);

    var resultsSection = document.getElementById("resultsSection");
    var list = document.getElementById("resultsList");
    list.innerHTML = "";

    if (state.heldCardIds.length === 0) {
      hideResults();
      return;
    }

    if (rows.length === 0) {
      var empty = document.createElement("div");
      empty.className = "empty-state";
      empty.textContent = "目前持有的卡片沒有適用於這個商店／地區的回饋資料。";
      list.appendChild(empty);
      resultsSection.classList.remove("hidden");
      return;
    }

    rows.forEach(function (c, idx) {
      var row = document.createElement("div");
      row.className = "result-card";

      var rank = document.createElement("div");
      rank.className = "result-rank" + (idx === 0 ? " rank-1" : "");
      rank.textContent = "#" + (idx + 1);

      var body = document.createElement("div");
      body.className = "result-body";

      var metaLines = [];
      if (c.cap) metaLines.push("上限：" + c.cap);
      if (c.note) metaLines.push("備註：" + c.note);
      if (c.validUntil) metaLines.push("活動期限：" + c.validUntil);

      body.innerHTML =
        '<div class="result-cardname"></div>' +
        '<div class="result-bank"></div>' +
        '<div class="result-plan"></div>' +
        '<div class="result-meta"></div>';
      body.querySelector(".result-cardname").textContent = c.cardName;
      body.querySelector(".result-bank").textContent = c.bankName;
      body.querySelector(".result-plan").textContent = "方案：" + c.planLabel;
      var metaEl = body.querySelector(".result-meta");
      metaLines.forEach(function (line) {
        var d = document.createElement("div");
        d.textContent = line;
        metaEl.appendChild(d);
      });

      var pct = document.createElement("div");
      pct.className = "result-pct";
      pct.textContent = (Math.round(c.pct * 100) / 100) + "%";

      row.appendChild(rank);
      row.appendChild(body);
      row.appendChild(pct);
      list.appendChild(row);
    });

    resultsSection.classList.remove("hidden");
    resultsSection.scrollIntoView({ behavior: "smooth", block: "start" });
  }

  function hideResults() {
    document.getElementById("resultsSection").classList.add("hidden");
    document.getElementById("resultsList").innerHTML = "";
  }

  // ---------- persistence ----------

  function savePrefs() {
    try {
      localStorage.setItem(
        STORAGE_KEY,
        JSON.stringify({
          version: STORAGE_VERSION,
          heldCardIds: state.heldCardIds,
          selectedTiers: state.selectedTiers
        })
      );
    } catch (e) {
      // localStorage unavailable, ignore
    }
  }

  // Restores prefs saved by this same v3 build. Any older format (v2's
  // "cardRewardsPrefs.v1" key, or malformed/missing-version data that might land
  // under this key in the future) is intentionally NOT migrated — SCHEMA.md calls
  // for resetting to defaults rather than attempting a hard conversion. Because
  // the storage key itself changed from v1 to v3, old data is simply invisible
  // here; the version/shape checks below are an extra safety net in case that
  // ever isn't true (e.g. a future format reusing this key).
  function restorePrefs() {
    var raw;
    try {
      raw = localStorage.getItem(STORAGE_KEY);
    } catch (e) {
      raw = null;
    }
    if (!raw) return;

    var parsed;
    try {
      parsed = JSON.parse(raw);
    } catch (e) {
      return; // corrupt JSON -> stay on defaults, no throw
    }

    var looksValid =
      parsed &&
      parsed.version === STORAGE_VERSION &&
      Array.isArray(parsed.heldCardIds) &&
      parsed.selectedTiers &&
      typeof parsed.selectedTiers === "object" &&
      !Array.isArray(parsed.selectedTiers);
    if (!looksValid) return; // unrecognized/old format -> reset to defaults, no hard conversion

    if (parsed.heldCardIds.length === 0) return;

    // only keep ids that still exist in current data
    var validIds = parsed.heldCardIds.filter(function (id) { return findBankByCardId(id); });
    if (validIds.length === 0) return;

    state.heldCardIds = validIds;
    state.selectedTiers = parsed.selectedTiers || {};

    validIds.forEach(function (id) {
      var cb = document.getElementById("card-" + id);
      if (cb) cb.checked = true;
    });

    document.getElementById("restoredBar").classList.remove("hidden");
    document.getElementById("restoredBar").classList.add("show");
    refreshStep2Visibility();
  }

  function resetAll() {
    try {
      localStorage.removeItem(STORAGE_KEY);
    } catch (e) {}
    state.heldCardIds = [];
    state.selectedTiers = {};
    state.currentQuery = null;

    document.getElementById("restoredBar").classList.add("hidden");
    document.getElementById("restoredBar").classList.remove("show");
    document.getElementById("step2").classList.add("hidden");
    document.getElementById("step3").classList.add("hidden");
    document.getElementById("skipStep2Note").classList.add("hidden");
    hideResults();

    var storeInput = document.getElementById("storeInput");
    if (storeInput) storeInput.value = "";
    document.getElementById("noMatchHint").style.display = "none";
    hideSelectedTarget();

    buildStep1();
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  document.addEventListener("DOMContentLoaded", function () {
    initAutocomplete();
    document.getElementById("resetBtn").addEventListener("click", resetAll);
    document.getElementById("resetTopBtn").addEventListener("click", resetAll);
    init();
  });
})();
</script>
